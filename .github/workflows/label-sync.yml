name: Label Sync

on:
  schedule:
    - cron: '0 6 * * 1'
  workflow_dispatch:
    inputs:
      force:
        description: 'Run even if disabled in config'
        type: boolean
        default: false
      dry_run:
        description: 'Dry run (no writes to Jira or Slack)'
        type: boolean
        default: false
      dm_override_email:
        description: 'Send all DMs to this email instead of assignees (for testing)'
        type: string
        default: ''

jobs:
  label-sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'

      - name: Build
        run: go build -o jira-board-keeper .

      - name: Write config
        run: echo "$CONFIG_YAML" > config.yaml
        env:
          CONFIG_YAML: ${{ secrets.CONFIG_YAML }}

      - name: Run label sync
        env:
          JIRA_EMAIL: ${{ secrets.JIRA_EMAIL }}
          JIRA_API_TOKEN: ${{ secrets.JIRA_API_TOKEN }}
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
        run: >-
          ./jira-board-keeper label-sync --config config.yaml
          --output-epics candidates.json
          ${{ inputs.force == true && '--force' || '' }}
          ${{ inputs.dry_run == true && '--dry-run' || '' }}

      - name: Set up Python
        if: hashFiles('candidates.json') != ''
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install cursor-sdk
        if: hashFiles('candidates.json') != ''
        run: pip install -r scripts/requirements.txt

      - name: Run epic style review
        if: hashFiles('candidates.json') != ''
        run: |
          TOKEN=$(echo -n "$JIRA_EMAIL:$JIRA_API_TOKEN" | base64)
          cat candidates.json | ATLASSIAN_MCP_TOKEN="Basic $TOKEN" python scripts/epic_review.py
        env:
          CURSOR_API_KEY: ${{ secrets.CURSOR_API_KEY }}
          SLACK_BOT_TOKEN: ${{ secrets.SLACK_BOT_TOKEN }}
          JIRA_EMAIL: ${{ secrets.JIRA_EMAIL }}
          JIRA_API_TOKEN: ${{ secrets.JIRA_API_TOKEN }}
          JIRA_BASE_URL: "https://redhat.atlassian.net"
          EPIC_REVIEW_DRY_RUN: ${{ inputs.dry_run == true && 'true' || 'false' }}
          DM_OVERRIDE_EMAIL: ${{ inputs.dm_override_email }}
