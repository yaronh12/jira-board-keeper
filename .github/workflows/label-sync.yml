name: Label Sync

on:
  schedule:
    - cron: '0 6 * * 1'
  workflow_dispatch:
    inputs:
      force:
        description: 'Run even if disabled in config'
        type: boolean
        default: false
      dry_run:
        description: 'Dry run (no writes to Jira or Slack)'
        type: boolean
        default: false

jobs:
  label-sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'

      - name: Build
        run: go build -o jira-board-keeper .

      - name: Write config
        run: echo "$CONFIG_YAML" > config.yaml
        env:
          CONFIG_YAML: ${{ secrets.CONFIG_YAML }}

      - name: Run label sync
        env:
          JIRA_EMAIL: ${{ secrets.JIRA_EMAIL }}
          JIRA_API_TOKEN: ${{ secrets.JIRA_API_TOKEN }}
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
        run: >-
          ./jira-board-keeper label-sync --config config.yaml
          ${{ inputs.force == true && '--force' || '' }}
          ${{ inputs.dry_run == true && '--dry-run' || '' }}
